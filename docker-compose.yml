services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medialogg
      POSTGRES_USER: medialogg
      POSTGRES_PASSWORD: ${DB_PASSWORD:-medialogg}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medialogg -d medialogg"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.18.1
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://medialogg:${DB_PASSWORD:-medialogg}@postgres:5432/medialogg?sslmode=disable",
        "up"
      ]
    volumes:
      - ./backend/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://medialogg:${DB_PASSWORD:-medialogg}@postgres:5432/medialogg?sslmode=disable
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_API_BASE_URL: http://localhost:8080
    environment:
      NUXT_API_BASE_URL: http://backend:8080
      NUXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
